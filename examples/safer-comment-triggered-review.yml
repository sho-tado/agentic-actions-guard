name: safer comment triggered review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Build read-only review artifact
        run: |
          mkdir -p reports
          printf '%s\n' "Synthetic comment-triggered review summary." > reports/comment-review.md
      - uses: actions/upload-artifact@v4
        with:
          name: comment-review
          path: reports/comment-review.md
