name: risky comment triggered review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - id: ai_review
        uses: openai/agent-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          prompt: |
            Review the maintainer request from this public comment:
            ${{ github.event.comment.body }}
      - run: gh issue comment "$ISSUE_NUMBER" --body "${{ steps.ai_review.outputs.summary }}"
