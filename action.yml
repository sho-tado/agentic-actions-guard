name: Agentic Actions Guard
description: Audit GitHub Actions workflows for risky AI-agent automation patterns.
author: OSS Maintainer Safety Contributors

inputs:
  path:
    description: Repository root, workflow directory, or workflow file to scan.
    required: false
    default: "."
  format:
    description: "Output format: markdown, json, sarif, review, annotations, or summary."
    required: false
    default: "sarif"
  fail-on:
    description: Severity threshold that fails the workflow.
    required: false
    default: "high"
  output:
    description: Optional path to write the report.
    required: false
    default: "agentic-actions-guard.sarif"
  allowlist:
    description: Optional JSON allowlist policy path.
    required: false
    default: ""
  allowlist-max-expiry-days:
    description: Optional maximum allowed number of days before an allowlist entry expires.
    required: false
    default: ""
  allowlist-require-removal-condition:
    description: Require allowlist entries to document how the accepted risk will be removed.
    required: false
    default: "false"
  step-summary:
    description: Write a short Markdown summary to the GitHub Actions step summary.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install Agentic Actions Guard
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Scan workflows
      shell: bash
      run: |
        set +e
        args=(scan "${{ inputs.path }}" --format "${{ inputs.format }}" --fail-on "${{ inputs.fail-on }}")
        if [ -n "${{ inputs.allowlist }}" ]; then
          args+=(--allowlist "${{ inputs.allowlist }}")
        fi
        if [ -n "${{ inputs.allowlist-max-expiry-days }}" ]; then
          args+=(--allowlist-max-expiry-days "${{ inputs.allowlist-max-expiry-days }}")
        fi
        if [ "${{ inputs.allowlist-require-removal-condition }}" = "true" ]; then
          args+=(--allowlist-require-removal-condition)
        fi
        agentic-actions-guard "${args[@]}" > "${{ inputs.output }}"
        status=$?
        cat "${{ inputs.output }}"
        if [ "${{ inputs.step-summary }}" = "true" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          summary_args=(scan "${{ inputs.path }}" --format summary --fail-on critical)
          if [ -n "${{ inputs.allowlist }}" ]; then
            summary_args+=(--allowlist "${{ inputs.allowlist }}")
          fi
          if [ -n "${{ inputs.allowlist-max-expiry-days }}" ]; then
            summary_args+=(--allowlist-max-expiry-days "${{ inputs.allowlist-max-expiry-days }}")
          fi
          if [ "${{ inputs.allowlist-require-removal-condition }}" = "true" ]; then
            summary_args+=(--allowlist-require-removal-condition)
          fi
          agentic-actions-guard "${summary_args[@]}" >> "$GITHUB_STEP_SUMMARY" || true
        fi
        exit "$status"
