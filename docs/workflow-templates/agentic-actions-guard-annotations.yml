name: agentic-actions-guard-annotations

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: sho-tado/agentic-actions-guard@v1.10.10
        with:
          path: .
          format: annotations
          fail-on: critical
          output: agentic-actions-guard.annotations
          step-summary: "true"
